<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>低维训练如何演化高维智能 · Can Low-Dimensional Light Illuminate a High-Dimensional World?</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      line-height: 1.75;
      min-height: 100vh;
    }

    /* ===== Header ===== */
    .site-header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 2.5rem 2rem 1.5rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }
    .site-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f0f6fc;
      max-width: 800px;
      margin: 0 auto 0.5rem;
      letter-spacing: -0.02em;
    }
    .site-header .subtitle {
      font-size: 0.95rem;
      color: #8b949e;
      font-style: italic;
      margin-bottom: 1.25rem;
    }

    /* ===== Language Switcher ===== */
    .lang-switcher {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-top: 0.5rem;
    }
    .lang-switcher button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 0.5rem 1.5rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      font-weight: 500;
      outline: none;
    }
    .lang-switcher button:first-child {
      border-radius: 6px 0 0 6px;
    }
    .lang-switcher button:last-child {
      border-radius: 0 6px 6px 0;
    }
    .lang-switcher button.active {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
      z-index: 1;
    }
    .lang-switcher button:hover:not(.active) {
      background: #30363d;
      color: #c9d1d9;
    }

    /* ===== Status Badge ===== */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: #8b949e;
      margin-top: 0.75rem;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
      display: inline-block;
    }
    .status-dot.loading { background: #d29922; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ===== Loading ===== */
    .loading-spinner {
      display: flex;
      justify-content: center;
      padding: 4rem 0;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Main Content ===== */
    .content-wrapper {
      max-width: 820px;
      margin: 2rem auto;
      padding: 0 1.5rem 4rem;
    }
    #content {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 2.5rem 2rem;
    }

    /* ===== Rendered Markdown Styles ===== */
    #content h1 { font-size: 1.6rem; color: #f0f6fc; margin: 1.5rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid #30363d; }
    #content h2 { font-size: 1.3rem; color: #f0f6fc; margin: 1.5rem 0 0.6rem; }
    #content h3 { font-size: 1.05rem; color: #f0f6fc; margin: 1.2rem 0 0.5rem; }
    #content p { margin: 0.8rem 0; }
    #content a { color: #58a6ff; text-decoration: none; }
    #content a:hover { text-decoration: underline; }
    #content strong { color: #f0f6fc; }
    #content em { color: #c9d1d9; }
    #content blockquote {
      border-left: 3px solid #58a6ff;
      padding: 0.5rem 0 0.5rem 1.25rem;
      margin: 1rem 0;
      color: #8b949e;
      background: rgba(88, 166, 255, 0.05);
      border-radius: 0 4px 4px 0;
    }
    #content blockquote p { margin: 0.3rem 0; }
    #content ul, #content ol { padding-left: 1.5rem; margin: 0.6rem 0; }
    #content li { margin: 0.3rem 0; }
    #content code {
      background: rgba(240, 246, 252, 0.1);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.9em;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    #content pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      margin: 1rem 0;
    }
    #content pre code { background: none; padding: 0; }
    #content hr { border: 0; border-top: 1px solid #30363d; margin: 1.5rem 0; }
    #content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9rem;
    }
    #content th, #content td {
      border: 1px solid #30363d;
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    #content th { background: #21262d; color: #f0f6fc; font-weight: 600; }
    #content tr:nth-child(even) { background: rgba(255,255,255,0.02); }

    /* ===== Footer ===== */
    .site-footer {
      text-align: center;
      padding: 2rem;
      color: #484f58;
      font-size: 0.85rem;
      border-top: 1px solid #30363d;
      max-width: 820px;
      margin: 0 auto;
    }
    .site-footer a { color: #58a6ff; text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .site-header { padding: 1.5rem 1rem 1rem; }
      .site-header h1 { font-size: 1.3rem; }
      #content { padding: 1.5rem 1rem; }
      .content-wrapper { padding: 0 0.75rem 2rem; }
    }

    /* ===== Print ===== */
    @media print {
      body { background: #fff; color: #000; }
      #content { background: #fff; border: none; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <h1 id="dynamic-title">低维训练如何演化高维智能</h1>
  <p class="subtitle">Can Low-Dimensional Light Illuminate a High-Dimensional World?</p>
  <div class="lang-switcher">
    <button id="btn-cn" class="active" onclick="switchLang('cn')">中文</button>
    <button id="btn-en" onclick="switchLang('en')">English</button>
  </div>
  <div class="status-badge">
    <span id="status-dot" class="status-dot loading"></span>
    <span id="status-text">Loading...</span>
  </div>
</header>

<div class="content-wrapper">
  <main id="content">
    <div class="loading-spinner"><div class="spinner"></div></div>
  </main>
</div>

<footer class="site-footer">
  <p>
    Published via <a href="https://github.com/yaoxinyaoxinyaoxin/text-to-world">GitHub</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/yaoxinyaoxinyaoxin/text-to-world/issues">Issues</a>
  </p>
</footer>

<script>
  const CN_FILE = '低维训练如何演化高维智能.md';
  const EN_FILE = 'How-Low-Dimensional-Training-Evolves-High-Dimensional-Intelligence.md';
  const CN_TITLE = '低维训练如何演化高维智能';
  const EN_TITLE = 'How Low-Dimensional Training Evolves High-Dimensional Intelligence';

  let currentLang = 'cn';
  let cached = { cn: null, en: null };

  function $(id) { return document.getElementById(id); }

  function updateStatus(loading, text) {
    const dot = $('status-dot');
    const label = $('status-text');
    dot.className = 'status-dot' + (loading ? ' loading' : '');
    label.textContent = text;
  }

  async function loadMarkdown(lang) {
    if (cached[lang]) return cached[lang];
    const file = lang === 'cn' ? CN_FILE : EN_FILE;
    const resp = await fetch(file);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    cached[lang] = text;
    return text;
  }

  // Simple markdown-to-HTML converter (handles the subset used in these articles)
  function renderMarkdown(md) {
    let html = md;

    // Code blocks (fenced)
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      return '<pre><code>' + escapeHtml(code.trimEnd()) + '</code></pre>';
    });

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Bold and italic
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

    // Images
    html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

    // Horizontal rules
    html = html.replace(/^---+$/gm, '<hr>');

    // Blockquotes — handle multi-line
    html = html.replace(/(^> .+(\n> .+)*)/gm, (match) => {
      const lines = match.split('\n').map(l => l.replace(/^> ?/, ''));
      return '<blockquote>' + lines.join('\n') + '</blockquote>';
    });

    // Headings
    html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // Tables
    html = html.replace(/(^\|.+\|$\n^\|[-|\s:]+\|$\n(?:^\|.+\|$\n?)*)/gm, (table) => {
      const rows = table.trim().split('\n');
      let result = '<table>';
      // Header
      result += '<thead><tr>';
      rows[0].split('|').filter(c => c.trim()).forEach(c => {
        result += '<th>' + c.trim() + '</th>';
      });
      result += '</tr></thead><tbody>';
      // Body (skip separator row)
      for (let i = 2; i < rows.length; i++) {
        result += '<tr>';
        rows[i].split('|').filter(c => c.trim()).forEach(c => {
          result += '<td>' + c.trim() + '</td>';
        });
        result += '</tr>';
      }
      result += '</tbody></table>';
      return result;
    });

    // Unordered lists
    html = html.replace(/((?:^- .+\n?)+)/gm, (list) => {
      const items = list.trim().split('\n').map(l => '<li>' + l.replace(/^- /, '') + '</li>');
      return '<ul>' + items.join('') + '</ul>';
    });

    // Ordered lists
    html = html.replace(/((?:^\d+\. .+\n?)+)/gm, (list) => {
      const items = list.trim().split('\n').map(l => '<li>' + l.replace(/^\d+\. /, '') + '</li>');
      return '<ol>' + items.join('') + '</ol>';
    });

    // Paragraphs — wrap remaining text blocks
    const lines = html.split('\n');
    let result = [];
    let inPara = false;
    let paraLines = [];

    function flushPara() {
      if (paraLines.length > 0) {
        result.push('<p>' + paraLines.join(' ') + '</p>');
        paraLines = [];
      }
    }

    for (let line of lines) {
      const trimmed = line.trim();
      // Skip empty lines, they separate paragraphs
      if (!trimmed) {
        flushPara();
        result.push('');
        continue;
      }
      // Skip lines that are already HTML blocks
      if (/^<(h[1-6]|table|thead|tbody|tr|th|td|ul|ol|li|blockquote|pre|hr|img|p|div)/.test(trimmed)) {
        flushPara();
        result.push(trimmed);
        continue;
      }
      if (/^<\/(table|ul|ol|blockquote|pre|div)>/.test(trimmed)) {
        flushPara();
        result.push(trimmed);
        continue;
      }
      paraLines.push(trimmed);
    }
    flushPara();

    return result.join('\n');
  }

  function escapeHtml(text) {
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function updateTitle(lang) {
    $('dynamic-title').textContent = lang === 'cn' ? CN_TITLE : EN_TITLE;
  }

  function updateButtons(lang) {
    $('btn-cn').className = lang === 'cn' ? 'active' : '';
    $('btn-en').className = lang === 'en' ? 'active' : '';
  }

  async function switchLang(lang) {
    if (lang === currentLang && cached[lang]) return;
    currentLang = lang;
    updateButtons(lang);
    updateTitle(lang);
    $('content').innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
    updateStatus(true, 'Loading ' + (lang === 'cn' ? '中文版...' : 'English...'));
    window.location.hash = lang;

    try {
      const md = await loadMarkdown(lang);
      const html = renderMarkdown(md);
      $('content').innerHTML = html;
      updateStatus(false, (lang === 'cn' ? '中文版' : 'English') + ' · ' + new Date().toLocaleDateString());
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (err) {
      $('content').innerHTML = '<p style="color:#f85149;text-align:center;padding:3rem 0;">Failed to load article: ' + err.message + '</p>';
      updateStatus(false, 'Error');
    }
  }

  // Init
  (function() {
    const hash = window.location.hash.replace('#', '');
    const lang = (hash === 'en') ? 'en' : 'cn';
    switchLang(lang);
  })();
</script>

</body>
</html>
